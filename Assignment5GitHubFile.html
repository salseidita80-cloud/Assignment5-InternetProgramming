<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Chess Enhanced</title>

  <!-- React and chess.js CDN files, like the professor starter page -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #020617;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }
    button {
      border: 0;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { filter: brightness(1.1); }
    .page {
      min-height: 100vh;
      padding: 28px;
    }
    .title {
      text-align: center;
      margin-bottom: 24px;
    }
    .title h1 {
      margin: 0;
      font-size: 42px;
    }
    .title p {
      margin-top: 8px;
      color: #94a3b8;
    }
    .layout {
      display: grid;
      grid-template-columns: auto 330px;
      gap: 24px;
      justify-content: center;
      align-items: start;
    }
    .panel {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .status {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .note { color: #94a3b8; font-size: 14px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-gray { background: #475569; }
    .btn-blue { background: #4338ca; }
    .btn-red { background: #be123c; }
    .captured {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .cap-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 12px;
    }
    .cap-label { color: #94a3b8; font-size: 13px; margin-bottom: 6px; }
    .cap-pieces { min-height: 34px; font-size: 26px; letter-spacing: 2px; }
    .material { text-align: center; color: #cbd5e1; font-size: 14px; margin-bottom: 14px; }
    .board {
      display: grid;
      grid-template-columns: repeat(8, 68px);
      border: 4px solid #334155;
      border-radius: 14px;
      overflow: hidden;
    }
    .square {
      width: 68px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 40px;
      cursor: pointer;
      user-select: none;
    }
    .square:hover { filter: brightness(1.08); }
    .light { background: #f1d9b5; color: #111827; }
    .dark { background: #166534; color: white; }
    .selected { background: #38bdf8 !important; color: #111827 !important; }
    .last { background: #facc15 !important; color: #111827 !important; }
    .check { box-shadow: inset 0 0 0 5px #ef4444; }
    .coord-rank, .coord-file {
      position: absolute;
      font-size: 11px;
      font-weight: bold;
      opacity: .65;
    }
    .coord-rank { top: 4px; left: 5px; }
    .coord-file { bottom: 4px; right: 5px; }
    .dot {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(0,0,0,.28);
    }
    .ring {
      position: absolute;
      inset: 6px;
      border: 4px solid rgba(0,0,0,.28);
      border-radius: 50%;
    }
    .history {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 12px;
      max-height: 330px;
      overflow-y: auto;
      margin-bottom: 18px;
    }
    .history-row {
      display: grid;
      grid-template-columns: 42px 1fr 1fr;
      gap: 8px;
      background: #0f172a;
      border-radius: 10px;
      padding: 9px 10px;
      margin-bottom: 8px;
    }
    .muted { color: #94a3b8; }
    .enhance-list {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.7;
      padding-left: 22px;
    }
    .error {
      padding: 30px;
      color: white;
      background: #020617;
      min-height: 100vh;
    }
    .error h1 { color: #f87171; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .board { grid-template-columns: repeat(8, 11vw); }
      .square { width: 11vw; height: 11vw; font-size: 6vw; }
    }
    @media (max-width: 520px) {
      .page { padding: 12px; }
      .captured { grid-template-columns: 1fr; }
      .title h1 { font-size: 30px; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="error">
      <h1>Loading React Chess...</h1>
      <p>If this stays here, the CDN scripts did not load.</p>
    </div>
  </div>

  <script>
    (function () {
      function showError(message) {
        var root = document.getElementById("root");
        root.innerHTML = '<div class="error"><h1>React Chess did not load</h1><p>' + message + '</p><p>This file uses CDN links, so it needs internet access.</p></div>';
      }

      window.addEventListener("error", function (event) {
        showError(event.message || "A JavaScript error happened.");
      });

      if (!window.React || !window.ReactDOM || !window.Chess) {
        showError("React, ReactDOM, or chess.js did not load.");
        return;
      }

      var h = React.createElement;
      var useState = React.useState;

      var blackSymbols = { p: "♟", r: "♜", n: "♞", b: "♝", q: "♛", k: "♚" };
      var whiteSymbols = { p: "♙", r: "♖", n: "♘", b: "♗", q: "♕", k: "♔" };

      var values = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };

      function ChessBoard() {
        var gameState = useState(function () { return new Chess(); });
        var game = gameState[0];
        var setGame = gameState[1];

        var selectedState = useState(null);
        var selected = selectedState[0];
        var setSelected = selectedState[1];

        var legalState = useState([]);
        var legalMoves = legalState[0];
        var setLegalMoves = legalState[1];

        var lastMoveState = useState(null);
        var lastMove = lastMoveState[0];
        var setLastMove = lastMoveState[1];

        var flippedState = useState(false);
        var flipped = flippedState[0];
        var setFlipped = flippedState[1];

        var noteState = useState("Click a piece to begin.");
        var note = noteState[0];
        var setNote = noteState[1];

        var board = game.board();
        var history = game.history({ verbose: true });

        function squareName(row, col) {
          return String.fromCharCode(97 + col) + (8 - row);
        }

        function copyGame() {
          return new Chess(game.fen());
        }

        function pieceDisplay(piece) {
          if (!piece) return "";
          return piece.color === "w" ? whiteSymbols[piece.type] : blackSymbols[piece.type];
        }

        function getStatus() {
          if (game.in_checkmate()) return "Checkmate — " + (game.turn() === "w" ? "Black" : "White") + " wins";
          if (game.in_stalemate()) return "Stalemate";
          if (game.in_draw()) return "Draw";
          if (game.in_check()) return (game.turn() === "w" ? "White" : "Black") + " is in check";
          return (game.turn() === "w" ? "White" : "Black") + " to move";
        }

        function getStatusStyle() {
          if (game.in_checkmate()) return "status";
          if (game.in_check() || game.in_stalemate() || game.in_draw()) return "status";
          return "status";
        }

        function getStatusColor() {
          if (game.in_checkmate()) return "#f87171";
          if (game.in_check() || game.in_stalemate() || game.in_draw()) return "#fde047";
          return "#86efac";
        }

        function selectSquare(square) {
          var piece = game.get(square);
          if (!piece) {
            setSelected(null);
            setLegalMoves([]);
            setNote("That square is empty.");
            return;
          }
          if (piece.color !== game.turn()) {
            setSelected(null);
            setLegalMoves([]);
            setNote("It is not that piece's turn.");
            return;
          }
          var moves = game.moves({ square: square, verbose: true }).map(function (m) { return m.to; });
          setSelected(square);
          setLegalMoves(moves);
          setNote("Selected " + square + ".");
        }

        function handleClick(row, col) {
          var square = squareName(row, col);

          if (!selected) {
            selectSquare(square);
            return;
          }

          if (square === selected) {
            setSelected(null);
            setLegalMoves([]);
            setNote("Selection cleared.");
            return;
          }

          if (legalMoves.indexOf(square) !== -1) {
            var nextGame = copyGame();
            var move = nextGame.move({ from: selected, to: square, promotion: "q" });
            if (move) {
              setGame(nextGame);
              setLastMove({ from: move.from, to: move.to });
              setSelected(null);
              setLegalMoves([]);
              setNote("Moved " + move.san + ".");
            }
            return;
          }

          var clickedPiece = game.get(square);
          if (clickedPiece && clickedPiece.color === game.turn()) {
            selectSquare(square);
          } else {
            setSelected(null);
            setLegalMoves([]);
            setNote("Illegal move.");
          }
        }

        function handleUndo() {
          var nextGame = copyGame();
          var undone = nextGame.undo();
          if (undone) {
            setGame(nextGame);
            setSelected(null);
            setLegalMoves([]);
            setLastMove(null);
            setNote("Undid the last move.");
          } else {
            setNote("No moves to undo.");
          }
        }

        function handleReset() {
          setGame(new Chess());
          setSelected(null);
          setLegalMoves([]);
          setLastMove(null);
          setFlipped(false);
          setNote("Game reset.");
        }

        function capturedBy(color) {
          return history.filter(function (move) {
            return move.captured && move.color === color;
          }).map(function (move) {
            return move.captured;
          });
        }

        var capturedWhite = capturedBy("w");
        var capturedBlack = capturedBy("b");
        var whiteMaterial = capturedWhite.reduce(function (sum, piece) { return sum + values[piece]; }, 0);
        var blackMaterial = capturedBlack.reduce(function (sum, piece) { return sum + values[piece]; }, 0);
        var materialText = "Material is even";
        if (whiteMaterial > blackMaterial) materialText = "White is +" + (whiteMaterial - blackMaterial);
        if (blackMaterial > whiteMaterial) materialText = "Black is +" + (blackMaterial - whiteMaterial);

        function renderCaptured(captured, capturedColor) {
          if (captured.length === 0) return h("span", { className: "muted", style: { fontSize: "16px" } }, "None");
          return captured.map(function (piece, index) {
            var display = capturedColor === "w" ? whiteSymbols[piece] : blackSymbols[piece];
            return h("span", { key: piece + index }, display);
          });
        }

        function renderSquares() {
          var squares = [];
          for (var displayRow = 0; displayRow < 8; displayRow++) {
            for (var displayCol = 0; displayCol < 8; displayCol++) {
              var row = flipped ? 7 - displayRow : displayRow;
              var col = flipped ? 7 - displayCol : displayCol;
              var square = squareName(row, col);
              var piece = board[row][col];
              var isLight = (row + col) % 2 === 0;
              var isSelected = selected === square;
              var isLegal = legalMoves.indexOf(square) !== -1;
              var isLast = lastMove && (lastMove.from === square || lastMove.to === square);
              var kingInCheck = piece && piece.type === "k" && piece.color === game.turn() && game.in_check();
              var className = "square " + (isLight ? "light" : "dark");

              if (isLast) className += " last";
              if (isSelected) className += " selected";
              if (kingInCheck) className += " check";

              squares.push(
                h("div", {
                  key: square,
                  className: className,
                  onClick: (function (r, c) {
                    return function () { handleClick(r, c); };
                  })(row, col)
                },
                  displayCol === 0 ? h("span", { className: "coord-rank" }, 8 - row) : null,
                  displayRow === 7 ? h("span", { className: "coord-file" }, String.fromCharCode(97 + col)) : null,
                  h("span", { style: { zIndex: 2 } }, pieceDisplay(piece)),
                  isLegal && !piece ? h("span", { className: "dot" }) : null,
                  isLegal && piece ? h("span", { className: "ring" }) : null
                )
              );
            }
          }
          return squares;
        }

        function renderHistory() {
          if (history.length === 0) return h("p", { className: "muted" }, "No moves yet.");
          var rows = [];
          for (var i = 0; i < history.length; i += 2) {
            var whiteMove = history[i];
            var blackMove = history[i + 1];
            rows.push(
              h("div", { className: "history-row", key: i },
                h("div", { className: "muted" }, Math.floor(i / 2) + 1 + "."),
                h("div", null, whiteMove ? whiteMove.san : "—"),
                h("div", null, blackMove ? blackMove.san : "—")
              )
            );
          }
          return rows;
        }

        return h("div", { className: "page" },
          h("div", { className: "title" },
            h("h1", null, "React Chess Enhanced"),
            h("p", null, "Assignment 5 - enhanced React chess page using React state and chess.js")
          ),
          h("div", { className: "layout" },
            h("div", { className: "panel" },
              h("div", { className: "topbar" },
                h("div", null,
                  h("div", { className: getStatusStyle(), style: { color: getStatusColor() } }, getStatus()),
                  h("div", { className: "note" }, note)
                ),
                h("div", { className: "controls" },
                  h("button", { className: "btn-gray", onClick: handleUndo }, "Undo"),
                  h("button", { className: "btn-blue", onClick: function () { setFlipped(!flipped); } }, "Flip Board"),
                  h("button", { className: "btn-red", onClick: handleReset }, "Reset")
                )
              ),
              h("div", { className: "captured" },
                h("div", { className: "cap-box" },
                  h("div", { className: "cap-label" }, "Captured by White"),
                  h("div", { className: "cap-pieces" }, renderCaptured(capturedWhite, "b"))
                ),
                h("div", { className: "cap-box" },
                  h("div", { className: "cap-label" }, "Captured by Black"),
                  h("div", { className: "cap-pieces" }, renderCaptured(capturedBlack, "w"))
                )
              ),
              h("div", { className: "material" }, materialText),
              h("div", { className: "board" }, renderSquares())
            ),
            h("div", { className: "panel" },
              h("h2", null, "Move History"),
              h("div", { className: "history" }, renderHistory()),
              h("h3", null, "10 Enhancements"),
              h("ol", { className: "enhance-list" },
                h("li", null, "Improved design and layout"),
                h("li", null, "Selected square highlight"),
                h("li", null, "Legal move highlights"),
                h("li", null, "Last move highlight"),
                h("li", null, "Board coordinates"),
                h("li", null, "Turn and status display"),
                h("li", null, "Check, checkmate, stalemate, and draw messages"),
                h("li", null, "Move history panel"),
                h("li", null, "Captured pieces and material count"),
                h("li", null, "Undo, reset, and flip board buttons")
              )
            )
          )
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(h(ChessBoard));
    })();
  </script>
</body>
</html>
